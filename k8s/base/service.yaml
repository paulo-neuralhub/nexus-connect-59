# IP-NEXUS Service
# Exposes the application within the cluster

apiVersion: v1
kind: Service
metadata:
  name: ipnexus-web
  namespace: ipnexus
  labels:
    app: ipnexus
    component: web
    app.kubernetes.io/name: ipnexus
    app.kubernetes.io/component: web
  annotations:
    # For service mesh integration (Istio, Linkerd)
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: ipnexus
    component: web

---
# Headless service for internal communication
apiVersion: v1
kind: Service
metadata:
  name: ipnexus-web-headless
  namespace: ipnexus
  labels:
    app: ipnexus
    component: web
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app: ipnexus
    component: web
