# IP-NEXUS Kubernetes Namespace
# Base configuration for the application namespace

apiVersion: v1
kind: Namespace
metadata:
  name: ipnexus
  labels:
    app.kubernetes.io/name: ipnexus
    app.kubernetes.io/part-of: ipnexus
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: "IP-NEXUS Intellectual Property Management Platform"

---
# Service Account for IP-NEXUS pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ipnexus-sa
  namespace: ipnexus
  labels:
    app.kubernetes.io/name: ipnexus
automountServiceAccountToken: false
