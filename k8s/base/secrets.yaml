# IP-NEXUS External Secret
# Pulls secrets from external secret manager (AWS Secrets Manager, HashiCorp Vault, etc.)

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ipnexus-secrets
  namespace: ipnexus
  labels:
    app.kubernetes.io/name: ipnexus
    app.kubernetes.io/component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager  # or 'vault', 'gcp-secret-manager'
  target:
    name: ipnexus-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # Supabase credentials
    - secretKey: SUPABASE_URL
      remoteRef:
        key: ipnexus/production
        property: supabase_url
    - secretKey: SUPABASE_ANON_KEY
      remoteRef:
        key: ipnexus/production
        property: supabase_anon_key
    - secretKey: SUPABASE_SERVICE_ROLE_KEY
      remoteRef:
        key: ipnexus/production
        property: supabase_service_role_key
    
    # Redis
    - secretKey: REDIS_URL
      remoteRef:
        key: ipnexus/production
        property: redis_url
    
    # AI Provider keys
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: ipnexus/production
        property: anthropic_api_key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: ipnexus/production
        property: openai_api_key
    
    # Encryption
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: ipnexus/production
        property: encryption_key
    - secretKey: JWT_SECRET
      remoteRef:
        key: ipnexus/production
        property: jwt_secret
    
    # Third-party integrations
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: ipnexus/production
        property: stripe_secret_key
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: ipnexus/production
        property: resend_api_key

---
# Alternative: Manual Secret (for initial setup or when not using ESO)
# IMPORTANT: In production, use External Secrets Operator instead!
# This is only for reference/development
apiVersion: v1
kind: Secret
metadata:
  name: ipnexus-secrets-manual
  namespace: ipnexus
  labels:
    app.kubernetes.io/name: ipnexus
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Replace with actual values (base64 encoded in production)
  SUPABASE_URL: "https://dcdbpmbzizzzzdfkvohl.supabase.co"
  SUPABASE_ANON_KEY: "your-anon-key"
  # Add other secrets as needed
