# Kustomize configuration for IP-NEXUS Kubernetes resources
# Usage: kubectl apply -k k8s/base/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: ipnexus-base

# Common labels for all resources
commonLabels:
  app.kubernetes.io/name: ipnexus
  app.kubernetes.io/managed-by: kustomize

# Common annotations
commonAnnotations:
  app.kubernetes.io/version: "1.0.0"

# Namespace for all resources
namespace: ipnexus

# Resources to include
resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - network-policy.yaml

# ConfigMap generator (alternative to static configmap)
# configMapGenerator:
#   - name: ipnexus-config
#     literals:
#       - NODE_ENV=production
#       - LOG_LEVEL=info

# Image configuration (for CI/CD overrides)
images:
  - name: ghcr.io/ipnexus/ipnexus-web
    newTag: latest

# Replicas configuration (can be overridden per environment)
# replicas:
#   - name: ipnexus-web
#     count: 3
