# IP-NEXUS Ingress
# Exposes the application to the internet

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ipnexus-ingress
  namespace: ipnexus
  labels:
    app: ipnexus
    app.kubernetes.io/name: ipnexus
    app.kubernetes.io/component: ingress
  annotations:
    # Ingress class
    kubernetes.io/ingress.class: nginx
    
    # TLS configuration
    cert-manager.io/cluster-issuer: letsencrypt-prod
    
    # Nginx specific settings
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-rpm: "1000"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    
    # CORS (if needed)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.ipnexus.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    
    # Compression
    nginx.ingress.kubernetes.io/use-gzip: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.ipnexus.com
        - www.ipnexus.com
      secretName: ipnexus-tls
  rules:
    # Main app
    - host: app.ipnexus.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ipnexus-web
                port:
                  number: 80
    
    # WWW redirect (handled by ingress controller)
    - host: www.ipnexus.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ipnexus-web
                port:
                  number: 80

---
# Ingress for Backoffice (separate subdomain)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ipnexus-backoffice-ingress
  namespace: ipnexus
  labels:
    app: ipnexus
    component: backoffice
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    
    # IP whitelist for backoffice (optional, more secure)
    # nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8,192.168.0.0/16"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - admin.ipnexus.com
      secretName: ipnexus-admin-tls
  rules:
    - host: admin.ipnexus.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ipnexus-web
                port:
                  number: 80
