# Prometheus Configuration for IP-NEXUS
# Local development monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

  # Attach labels to all time series
  external_labels:
    monitor: 'ipnexus-monitor'
    environment: 'development'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
# rule_files:
#   - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # IP-NEXUS Application (when running with metrics endpoint)
  - job_name: 'ipnexus-app'
    static_configs:
      - targets: ['app:5173']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # Redis metrics (requires redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics

  # Node exporter for system metrics (optional)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

# Remote write configuration (for sending to cloud providers)
# remote_write:
