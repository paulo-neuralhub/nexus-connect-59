# IP-NEXUS Production Docker Compose
# With Traefik for automatic SSL

version: '3.9'

services:
  # ==========================================
  # IP-NEXUS WEB APPLICATION
  # ==========================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_APP_URL=${VITE_APP_URL}
    container_name: ip-nexus-web
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - NODE_ENV=production
    networks:
      - ip-nexus-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ip-nexus.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.ip-nexus.entrypoints=websecure"
      - "traefik.http.routers.ip-nexus.tls=true"
      - "traefik.http.routers.ip-nexus.tls.certresolver=letsencrypt"
      - "traefik.http.services.ip-nexus.loadbalancer.server.port=8080"
      # WWW redirect
      - "traefik.http.routers.ip-nexus-www.rule=Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.ip-nexus-www.entrypoints=websecure"
      - "traefik.http.routers.ip-nexus-www.tls=true"
      - "traefik.http.routers.ip-nexus-www.middlewares=www-redirect"
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # TRAEFIK REVERSE PROXY
  # ==========================================
  traefik:
    image: traefik:v2.10
    container_name: ip-nexus-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/acme.json:/acme.json
    networks:
      - ip-nexus-network
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=INFO"

networks:
  ip-nexus-network:
    driver: bridge
